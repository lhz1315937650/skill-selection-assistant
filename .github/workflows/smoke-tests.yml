name: Smoke Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  smoke-tests:
    name: PowerShell smoke tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run smoke tests
        shell: pwsh
        run: ./tests/run-smoke-tests.ps1

  python-smoke-tests:
    name: Python ${{ matrix.python }} smoke tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
          - os: ubuntu-latest
            python: "3.12"
          - os: macos-latest
            python: "3.12"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Run cross-platform smoke tests
        run: python tests/run-python-smoke-tests.py
