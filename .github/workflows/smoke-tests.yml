name: Smoke Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  smoke-tests:
    name: PowerShell smoke tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke tests
        shell: pwsh
        run: ./tests/run-smoke-tests.ps1
