interface:
  display_name: "技能选择助手"
  short_description: "先匹配本地 skill，再按用户提问语言简要介绍并让用户选择；必要时继续确认前置配置"
  default_prompt: "Inspect the local skill library, pick the best 1-3 matching skills, introduce them briefly in the same language the user used, and ask the user which skill to use. After the user chooses a skill, treat it as the active skill for the current conversation and keep using it on later turns unless the work clearly needs a different skill. Only ask the user to choose again when a later turn clearly needs a new skill. If a selected skill may require downloading or installing dependencies, ask for confirmation before starting environment setup. If the selected skill needs user-specific prerequisite configuration, ask the necessary setup questions before execution."
