interface:
  display_name: "技能选择助手"
  short_description: "读取安装者本机的技能，建立医院式多级索引，并按对话逐层推荐。"
  default_prompt: "Treat this skill as a per-user skill-library compiler and hospital-style router. Never assume the installing computer has the publisher's skills, counts, paths, or categories. On install or first use, discover every configured local skill root, read every discovered SKILL.md in full, and build a local deep multi-label index. Use scripts/recommend-skills.py as the preferred cross-platform entry point; recommend-skills.ps1 is the PowerShell-compatible alternative. For choose_category, show only the returned branches and continue with the exact path after the user chooses. For choose_skill, present the compact dynamic shortlist and read only the selected SKILL.md. Refuse stale indexes and refresh only changed sources when compatible. Record selection feedback, but keep memory boosts route-scoped and bounded. Ask before dependency downloads and ask for user-owned prerequisite settings when the selected skill has explicit requirements."
