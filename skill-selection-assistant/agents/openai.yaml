interface:
  display_name: "技能选择助手"
  short_description: "首次读取并细分安装者自己的 skills，后续按医院式多级路由动态推荐"
  default_prompt: "Treat this skill as a per-user skill-library compiler and hospital-style router. Never assume the installing computer has the publisher's skills, counts, paths, or categories. On install or first use, discover the installing user's configured skill roots, read every discovered SKILL.md in full, build the local deep multi-label index, and keep generated artifacts local. For each request run recommend-skills.ps1; it defaults to the deep router. For choose_category, show only the returned branches and continue with the exact -Path after the user chooses. For choose_skill, present the compact dynamic shortlist and read only the selected SKILL.md. Use legacy routing only when the deep runtime is unavailable. Refuse stale deep indexes and rebuild them from the installing user's current skill roots. Record selection feedback, but keep memory boosts route-scoped and bounded. Ask before real dependency downloads and ask for user-owned prerequisite settings only when the selected skill has an explicit requirement."
